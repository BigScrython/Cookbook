<script>
document.getElementById("searchForm").addEventListener("submit", function(e) {
   e.preventDefault();
   let query = document.getElementById("searchInput").value.trim();
   if (query === "") return;
   let formattedQuery = query.split(" ").join("+");
   window.location.href = `/${formattedQuery}`;
});
</script>
