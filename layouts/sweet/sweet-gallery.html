<!DOCTYPE html>
<html>
<head>
   <title>{{ .Title }}</title>
   <link rel='stylesheet' href='/templs/ss.css' type=text/css>
   <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
   <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
</head>
<body>
<div class='main'>
   <div style="text-align: center; margin-bottom: 5px;">
                <div style="margin-bottom: 5px;"><img src="/images/toor-s-cookbook-logo.png"alt="Logo"  width="41%" margin="auto"></div>
                <button class="pageButton" onclick="window.location.href='/'">
                Home
                </button>
                <button class="pageButton pxGap" onclick="window.location.href='/savoury/list'">
                Savoury
                </button>
                <h1 class="fullMark pxGap">Sweet</h1>
                <br>
                <form action="/search" method="GET" id="searchForm">
                <input type="text" name="query" autocomplete="off" placeholder="" class="searchBar" id="searchInput"/>
                <button type="submit" class="searchButton"><img src="media/searchicon.png" width="35" height="35"></button>
                </form>
                <div id="searchResults" class="search-results"></div>
                <br>
                <button class="pageButton" onclick="window.location.href='/sweet/list'">
                List View
                </button>
                <button class="pageButton pxGap" onclick="window.location.href=''">
                Gallery View
                </button>
                <br></br>

<div class="gallery">
{{ range where (where (where site.RegularPages "Section" "recipes") "Params.image" "!=" nil) "Params.category" "sweet" }}
  <div class="gallery-item">
    <a href="{{ .RelPermalink }}">
      <img src="{{ .Params.image }}" alt="{{ .Title }}">
    </a>
    <h3 class="fullMark">{{.Title}}</h3>
  </div>
{{ end }}
</div>

   </div>
</div>
</body>
</html>
<script>
let recipes = [];

fetch('/index.json')
  .then(res => res.json())
  .then(data => recipes = data);

const input = document.getElementById("searchInput");
const resultsBox = document.getElementById("searchResults");

input.addEventListener("input", function() {
  let query = input.value.trim().toLowerCase();

  if (query === "") {
    resultsBox.innerHTML = "";
    return;
  }

  let matches = recipes
    .filter(r => r.title.toLowerCase().includes(query))
    .slice(0, 5);

  resultsBox.innerHTML = matches.map(r => `
    <div class="search-item" onclick="window.location.href='${r.url}'">
      ${r.title}
    </div>
  `).join("");
});
</script>
