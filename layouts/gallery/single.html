<!DOCTYPE html>
<html>
<head>
   <title>Photo view</title>
   <link rel="stylesheet" href="/templs/recipes.css" type="text/css">
</head>
<body>
<div class='main'>
   <div style="text-align: center; margin-bottom: 5px;">
      <button class="pageButton pxGap" onclick="window.location.href='/'">
      Back to gallery
      </button>
                <br></br>
                <div><img src="{{ .Params.image }}" alt="Image" onerror="this.style.display = 'none';" class="pxGap" width="500" height="667"></div>
      <h2 class="fullMark pxGap">{{ .Title }}</h2>
                <h3 class="halfMark pxGap">{{ .Params.source }}</h3>
   </div>
</div>
</body>
</html>
