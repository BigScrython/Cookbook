<!DOCTYPE html>
<html>
<head>
   <title>{{ .Title }}</title>
   <link rel='stylesheet' href='/templs/ss.css' type=text/css>
   <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
   <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
</head>
<body>
<div class='main'>
   <div style="text-align: center; margin-bottom: 5px;">
                <br><br>
      <div style="margin-bottom: 10px;"><a href="../.."><img src="/images/toor-s-cookbook-logo.png"alt="Logo"  width="45%" margin="auto"></a></div>
      <div class="thinLine"></div>
      <div class="nav-container">
      <a href="/sweet/gallery" class="navBarText">SWEET</a>
      <a href="/savoury/gallery" class="navBarText">SAVOURY</a>
      <a href="/aboutme" class="navBarText">ABOUT ME</a>
      <div class="search-wrapper">
        <div class="searchBarWrap">
        <form id="searchForm" autocomplete="off">
          <input type="text"
                 id="searchInput"
                 name="query"
                 class="searchBar"
                 autocomplete="off" />
        <button type="submit" class="searchButton pxGap">
        <img src="/images/searchiconweb.png" width="22" height="22">
        </button>
        <div id="searchResults" class="search-results"></div>
        </form>
        </div>
      </div>
      </div>
      <div class="thinLine"></div>
      <br><br>
      <h1>SAVOURY</h1>
                <button class="pageButton" onclick="window.location.href='/savoury/list'">
                List View
                </button>
                <button class="pageButton pxGap" onclick="window.location.href=''">
                Gallery View
                </button>
                <br></br>

<div class="gallery">
{{ range where (where (where site.RegularPages "Section" "recipes") "Params.image" "!=" nil) "Params.category" "savoury" }}
  <div class="gallery-item">
    <a href="{{ .RelPermalink }}">
      <img src="{{ .Params.image }}" alt="{{ .Title }}">
    </a>
    <h3 class="fullMark">{{.Title}}</h3>
  </div>
{{ end }}
</div>

   </div>
</div>
</body>
</html>
<script>
let recipes = [];

<script>
let recipes = [];

fetch('/index.json')
  .then(res => res.json())
  .then(data => recipes = data);

const input = document.getElementById("searchInput");
const resultsBox = document.getElementById("searchResults");

input.addEventListener("input", function() {
  let query = input.value.trim().toLowerCase();

  if (query === "") {
    resultsBox.innerHTML = "";
    return;
  }

  let matches = recipes
    .filter(r => r.title.toLowerCase().includes(query))
    .slice(0, 5);

  resultsBox.innerHTML = matches.map(r => `
    <div class="search-item" onclick="window.location.href='${r.url}'">
      ${r.title}
    </div>
  `).join("");
});
</script>
