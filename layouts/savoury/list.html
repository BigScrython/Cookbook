<!DOCTYPE html>
<html>
<head>
   <title>{{ .Title }}</title>
   <link rel='stylesheet' href='templs/ss.css' type=text/css>
   <meta charset="UTF-8">
</head>
<body>
<div class='main'>
   <div style="text-align: center; margin-bottom: 5px;">
                <div><img src="media/Logo.png" alt="Logo" class="pxGap" width="700"></div>
                <button class="pageButton" onclick="window.location.href='homepage'">
                Home
                </button>
                <button class="pageButton pxGap" onclick="window.location.href='sweet_gallery'">
                Sweet
                </button>
                <h1 class="fullMark pxGap">Savoury</h1>
                <br>
                <form action="/search" method="GET" id="searchForm">
                <input type="text" name="query" placeholder="" class="searchBar" id="searchInput"/>
                <button type="submit" class="searchButton"><img src="media/searchicon.png" width="35" height="35"></button>
                </form>
                <br>
                <button class="pageButton" onclick="window.location.href='savoury_list'">
                List View
                </button>
                <button class="pageButton pxGap" onclick="window.location.href='savoury_gallery'">
                Gallery View
                </button>
                <br></br>
                <h4 class="fullMark pxGap"><a href="testrecipe">Recipe 1</a></h1>
                <h4 class="fullMark pxGap"><a href="testrecipe">Recipe 2</a></h4>
                <h4 class="fullMark pxGap"><a href="testrecipe">Recipe 3</a></h4>
   </div>
</div>
</body>
</html>
<script>
document.getElementById("searchForm").addEventListener("submit", function(e) {
   e.preventDefault();
   let query = document.getElementById("searchInput").value.trim();
   if (query === "") return;
   let formattedQuery = query.split(" ").join("+");
   window.location.href = `/${formattedQuery}`;
});
</script>
