backend:
  name: github
  repo: BigScrython/Cookbook
  branch: main

media_folder: "static/images"
public_folder: "/images"

build:
  writeStats: true

collections:
  - name: "gallery"
    label: "Gallery"
    folder: "content/gallery"
    create: true
    slug: "{{slug}}"
    fields:
      - label : "Title"
        name : "title"
        widget : "string"
        
      - label: "Image" 
        name: "image" 
        widget: "image"
      
      - label: "Source" 
        name: "source" 
        widget: "string"

  - name: "recipes"
    label: "Recipes"
    folder: "content/recipes"
    create: true
    slug: "{{slug}}"

    fields:
      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Source"
        name: "source"
        widget: "string"

      - label: "Link"
        name: "link"
        widget: "string"

      - label: "Image"
        name: "image"
        widget: "image"
        required: false

      - label: "Ingredients"
        name: "ingredients"
        widget: "list"
        field:
          label: "Ingredient"
          name: "ingredient"
          widget: "string"

      - label: "Method"
        name: "method"
        widget: "list"
        field:
          label: "Step"
          name: "step"
          widget: "string"

      - label: "Sweet or Savoury"
        name: "category"
        widget: "select"
        options:
          - { label: "Sweet", value: "sweet" }
          - { label: "Savoury", value: "savoury" }
